# Nepes Light — kitty color scheme
# Copy to ~/.config/kitty/nepes-light.conf and add:
#   include nepes-light.conf

# --- Base colors ---
foreground #1C1C1E
background #F8F8F8

# --- Cursor ---
cursor #1C1C1E
cursor_text_color #F8F8F8

# --- Selection ---
selection_foreground #1C1C1E
selection_background #B8D0F0

# --- URL ---
url_color #2D7A82

# --- Window borders ---
active_border_color #23438E
inactive_border_color #D8D7D7
bell_border_color #D08A10
visual_bell_color none

# --- Tab bar (powerline) ---
active_tab_foreground #1C1C1E
active_tab_background #1B3470
inactive_tab_foreground #7A7A84
inactive_tab_background #F0F0F0
tab_bar_background #FFFFFF
tab_bar_margin_color #FFFFFF

# --- Scrollback marks ---
mark1_foreground #F8F8F8
mark1_background #23438E
mark2_foreground #F8F8F8
mark2_background #D08A10
mark3_foreground #F8F8F8
mark3_background #7A4FA0

# --- macOS titlebar ---
macos_titlebar_color #F8F8F8

# --- ANSI colors ---
color0  #1C1C1E
color1  #C4181F
color2  #2A8030
color3  #D08A10
color4  #23438E
color5  #7A4FA0
color6  #2D7A82
color7  #E7E6E6
color8  #707079
color9  #D4252C
color10 #43AD49
color11 #FEA413
color12 #2E55B0
color13 #9B6ABF
color14 #3A9BA5
color15 #F8F8F8
