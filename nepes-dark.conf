# Nepes Dark — kitty color scheme
# Copy to ~/.config/kitty/nepes-dark.conf and add:
#   include nepes-dark.conf

# --- Base colors ---
foreground #DCD8D4
background #1E1C1A

# --- Cursor ---
cursor #DCD8D4
cursor_text_color #1E1C1A

# --- Selection ---
selection_foreground #DCD8D4
selection_background #2D4A6A

# --- URL ---
url_color #3A9BA5

# --- Window borders ---
active_border_color #6A84CA
inactive_border_color #3E3A38
bell_border_color #FEA413
visual_bell_color none

# --- Tab bar (powerline) ---
active_tab_foreground #DCD8D4
active_tab_background #23438E
inactive_tab_foreground #787068
inactive_tab_background #262422
tab_bar_background #161412
tab_bar_margin_color #161412

# --- Scrollback marks ---
mark1_foreground #1E1C1A
mark1_background #6A84CA
mark2_foreground #1E1C1A
mark2_background #FEA413
mark3_foreground #1E1C1A
mark3_background #A274C3

# --- macOS titlebar ---
macos_titlebar_color #1E1C1A

# --- ANSI colors ---
color0  #161412
color1  #E1575C
color2  #43AD49
color3  #FEA413
color4  #6A84CA
color5  #A274C3
color6  #3A9BA5
color7  #A5A8AF
color8  #8D847B
color9  #E85B61
color10 #6BCF70
color11 #FFBD4A
color12 #6B8AD8
color13 #BB8EDA
color14 #5CBDC7
color15 #DCD8D4
